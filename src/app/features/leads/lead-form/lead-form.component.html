<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h2>{{ lead ? 'Edit Lead' : 'New Lead' }}</h2>
        <p>{{ lead ? 'Update lead information' : 'Add a new lead to the pipeline' }}</p>
      </div>
      <button class="close-btn" (click)="cancelled.emit()"><span class="material-icons">close</span></button>
    </div>

    @if (error) {
      <div class="form-error"><span class="material-icons">error</span> {{ error }}</div>
    }

    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Company Name *</label>
          <input type="text" [(ngModel)]="form.companyName" placeholder="e.g. Dangote Industries" required>
        </div>
        <div class="form-group">
          <label>Contact Person *</label>
          <input type="text" [(ngModel)]="form.contactPerson" placeholder="Full name">
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" [(ngModel)]="form.email" placeholder="contact@company.com">
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" [(ngModel)]="form.phone" placeholder="080XXXXXXXX">
        </div>
        <div class="form-group">
          <label>Industry</label>
          <select [(ngModel)]="form.industry">
            @for (i of industries; track i) { <option [value]="i">{{ i }}</option> }
          </select>
        </div>
        <div class="form-group">
          <label>Deal Value (₦)</label>
          <input type="number" [(ngModel)]="form.dealValue" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>Stage</label>
          <select [(ngModel)]="form.stage">
            @for (s of stages; track s) { <option [value]="s">{{ s }}</option> }
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select [(ngModel)]="form.priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="form-group">
          <label>Source</label>
          <select [(ngModel)]="form.source">
            @for (s of sources; track s) { <option [value]="s">{{ s }}</option> }
          </select>
        </div>
        <div class="form-group">
          <label>Assigned To</label>
          <select [(ngModel)]="form.assignedTo">
            <option value="">Unassigned</option>
            @for (a of agents; track a._id) { <option [value]="a._id">{{ a.name }} ({{ a.role }})</option> }
          </select>
        </div>
        <div class="form-group full-width">
          <label>Notes</label>
          <textarea [(ngModel)]="form.notes" rows="3" placeholder="Additional notes about this lead..."></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="cancelled.emit()">Cancel</button>
      <button class="btn-save" (click)="save()" [disabled]="loading">
        @if (loading) { <span class="spinner-sm"></span> Saving... }
        @else { <span class="material-icons">save</span> {{ lead ? 'Update Lead' : 'Create Lead' }} }
      </button>
    </div>
  </div>
</div>

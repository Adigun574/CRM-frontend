<div class="login-page">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <span class="material-icons">hub</span>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to your CRM account</p>
    </div>

    @if (error()) {
      <div class="alert alert-error">
        <span class="material-icons">error_outline</span>
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="material-icons input-icon">email</span>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@company.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="material-icons input-icon">lock</span>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
            <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" [class.loading]="loading()" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Signing in...
        } @else {
          <span class="material-icons">login</span> Sign In
        }
      </button>
    </form>

    <div class="demo-section">
      <p class="demo-label">Quick Demo Access</p>
      <div class="demo-buttons">
        <button class="demo-btn admin" (click)="fillDemo('admin')">
          <span class="material-icons">admin_panel_settings</span> Admin
        </button>
        <button class="demo-btn sales" (click)="fillDemo('sales')">
          <span class="material-icons">trending_up</span> Sales
        </button>
        <button class="demo-btn support" (click)="fillDemo('support')">
          <span class="material-icons">support_agent</span> Support
        </button>
      </div>
    </div>
  </div>
</div>

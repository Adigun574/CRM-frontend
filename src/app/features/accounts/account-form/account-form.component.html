<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h2>{{ account ? 'Edit Account' : 'New Account' }}</h2>
        <p>{{ account ? 'Update account information' : 'Add a new company account' }}</p>
      </div>
      <button class="close-btn" (click)="cancelled.emit()"><span class="material-icons">close</span></button>
    </div>

    @if (error) {
      <div class="form-error"><span class="material-icons">error</span> {{ error }}</div>
    }

    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Company Name *</label>
          <input type="text" [(ngModel)]="form.name" placeholder="e.g. Dangote Industries">
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <select [(ngModel)]="form.type">
            @for (t of types; track t) { <option [value]="t">{{ t }}</option> }
          </select>
        </div>
        <div class="form-group">
          <label>Industry</label>
          <select [(ngModel)]="form.industry">
            @for (i of industries; track i) { <option [value]="i">{{ i }}</option> }
          </select>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="form.email" placeholder="info@company.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" [(ngModel)]="form.phone" placeholder="080XXXXXXXX">
        </div>
        <div class="form-group full-width">
          <label>Website</label>
          <input type="url" [(ngModel)]="form.website" placeholder="https://company.com">
        </div>
        <div class="form-group">
          <label>Number of Employees</label>
          <input type="number" [(ngModel)]="form.employees" min="0">
        </div>
        <div class="form-group">
          <label>Annual Revenue (₦)</label>
          <input type="number" [(ngModel)]="form.annualRevenue" min="0">
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" [(ngModel)]="form.address!.city" placeholder="City">
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" [(ngModel)]="form.address!.state" placeholder="State">
        </div>
        <div class="form-group">
          <label>Assigned To</label>
          <select [(ngModel)]="form.assignedTo">
            <option value="">Unassigned</option>
            @for (a of agents; track a._id) { <option [value]="a._id">{{ a.name }} ({{ a.role }})</option> }
          </select>
        </div>
        <div class="form-group full-width">
          <label>Description</label>
          <textarea [(ngModel)]="form.description" rows="2" placeholder="Brief description of this account..."></textarea>
        </div>
        <div class="form-group full-width">
          <label>Notes</label>
          <textarea [(ngModel)]="form.notes" rows="2" placeholder="Additional internal notes..."></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="cancelled.emit()">Cancel</button>
      <button class="btn-save" (click)="save()" [disabled]="loading">
        @if (loading) { <span class="spinner-sm"></span> Saving... }
        @else { <span class="material-icons">save</span> {{ account ? 'Update Account' : 'Create Account' }} }
      </button>
    </div>
  </div>
</div>
